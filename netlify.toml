# Netlify 配置 (备用方案)
# 如不使用 GitHub Pages, 可将此文件用于 Netlify 部署

[build]
  command = "hugo --gc --minify"
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  HUGO_VERSION = "0.128.0"
  HUGO_ENV = "production"
  HUGO_ENABLEGITINFO = "true"

[context.production.environment]
  HUGO_VERSION = "0.128.0"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "hugo server -D --port 8080"
  targetPort = 8080
  port = 8888
  publish = "public"
  autoLaunch = true
