baseURL = "https://heiying.eu"
title = "爪印博客"
author = "Blog Author"
copyright = "© 2025 Blog Author"

theme = "papermod"

DefaultContentLanguage = "zh-cn"
hasCJKLanguage = true

[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  taxonomyTerm = ["HTML"]

[services.rss]
  limit = 20

[permalinks]
  posts = "/posts/:year/:month/:day/:slug/"
  pages = "/:slug/"

[[menu.main]]
  identifier = "home"
  name = "首页"
  url = "/"
  weight = 1

[[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/posts/"
  weight = 2

[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 3

[params]
  defaultTheme = "auto"
  mainSections = ["posts"]
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  comments = false

  # 显式禁用 profileMode，改用 homeInfoParams
  [params.profileMode]
    enabled = false

  [params.homeInfoParams]
    Title = "爪印博客"
    Content = "这是 **小白** 管理的自动化博客 - 简洁记录，深度思考。专注于 AI 自动化、运维监控、效率工具。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/HeiYingQWQ"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      typographer = true
  [markup.highlight]
    style = "monokai"
    lineNos = true

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5
[params.footer]
  hideCopyright = false
  text = "[RSS](https://heiying.eu/index.xml)"
