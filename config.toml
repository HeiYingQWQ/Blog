baseURL = "https://HeiYingQWQ.github.io/Blog"
title = "全自动博客"
author = "Blog Author"
copyright = "© 2025 Blog Author"

theme = "papermod"

DefaultContentLanguage = "zh-cn"
hasCJKLanguage = true

[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  taxonomyTerm = ["HTML"]

[services.rss]
  limit = 20

[permalinks]
  posts = "/posts/:year/:month/:day/:slug/"
  pages = "/:slug/"

[[menu.main]]
  identifier = "home"
  name = "首页"
  url = "/"
  weight = 1

[[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/posts/"
  weight = 2

[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 3

[params]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  comments = false

  [params.profileMode]
    enabled = true
    title = "全自动博客"
    subtitle = "一个基于 Hugo + GitHub Pages 的自动化博客系统"
    imageUrl = "profile.jpg"
    imageTitle = "Profile"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/HeiYingQWQ"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      typographer = true
  [markup.highlight]
    style = "monokai"
    lineNos = true

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5
