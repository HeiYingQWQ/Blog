# Hexo Configuration
# https://hexo.io/docs/configuration

# Site
title: 爪印博客
subtitle: 简洁记录，深度思考
description: 专注于 AI 自动化、运维监控、效率工具
author: 小白
language: zh-CN
timezone: Europe/Rome

# URL
url: https://heiying.eu
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :year/:month/:day/:title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  tab_replace: ''
  wrap: true
  hljs: false

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
use_date_for_updated: false

# Pagination
per_page: 10
pagination_dir: page

# Extensions
theme: stellar
exclude_generator:

# Stellar Theme Config
avatar:
  enable: true
  url: /avatar.svg

# Optional: feed, SEO, etc.
feed:
  type: rss2
  path: rss2.xml
  limit: 20
